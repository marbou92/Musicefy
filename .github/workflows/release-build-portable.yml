name: Release Portable EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Run Build Portable script
        shell: cmd
        run: |
          call scripts\build-portable.bat "${{ env.QT_PATH }}\bin"

      - name: Sign release binary
        if: env.SIGN_CERT_FILE != ''
        shell: cmd
        run: |
          call scripts\sign-release.bat "%SIGN_CERT_FILE%"
        env:
          SIGN_CERT_FILE: ${{ secrets.SIGN_CERT_FILE }}
          SIGN_CERT_PASS: ${{ secrets.SIGN_CERT_PASS }}

      - name: Create ZIP of portable folder
        shell: pwsh
        run: |
          $out = Join-Path $PWD 'build\bin\Release'
          $portable = Join-Path $PWD 'Musicefy-Portable'
          if (Test-Path $portable) { Remove-Item -Recurse -Force $portable }
          New-Item -ItemType Directory -Path $portable | Out-Null
          Copy-Item -Path (Join-Path $out '*') -Destination $portable -Recurse -Force
          
          $zip = Join-Path $PWD 'Musicefy-Portable.zip'
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory($portable, $zip)
          Write-Host "Created $zip"

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Musicefy ${{ github.ref_name }} (Pre-release)
          body: |
            ⚠️ Pre-release build ⚠️
            Musicefy ${{ github.ref_name }} portable build generated by CI.
            This version is intended for testing and may not be stable.
          draft: false
          prerelease: true
          files: |
            Musicefy-Portable.zip
            build/bin/Release/musicefy.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
