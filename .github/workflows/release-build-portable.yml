name: Release Portable EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        id: install-qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_PREFIX_PATH="${{ steps.install-qt.outputs.qt-path }}" ^
            -S . -B build

      - name: Build Release
        shell: cmd
        run: |
          cmake --build build --config Release --parallel

      - name: Run windeployqt and package
        shell: pwsh
        run: |
          $qtPath = "${{ steps.install-qt.outputs.qt-path }}"
          $deployExe = Join-Path $qtPath "bin\windeployqt.exe"
          Write-Host "Qt path: $qtPath"
          Write-Host "windeployqt: $deployExe"

          & $deployExe --release --no-translations --no-system-d3d-compiler --no-opengl-sw --verbose 1 build\bin\Release\musicefy.exe

          # Copy SQL driver plugins
          $sqldrivers = "build\bin\Release\sqldrivers"
          New-Item -ItemType Directory -Path $sqldrivers -Force | Out-Null
          Copy-Item (Join-Path $qtPath "plugins\sqldrivers\qsqlite.dll") $sqldrivers -Force

          # Copy database migrations
          $migrations = "build\bin\Release\migrations"
          New-Item -ItemType Directory -Path $migrations -Force | Out-Null
          Copy-Item "src\core\database\migrations\*" $migrations -Force

          # Create portable folder
          $portable = Join-Path $PWD 'Musicefy-Portable'
          if (Test-Path $portable) { Remove-Item -Recurse -Force $portable }
          New-Item -ItemType Directory -Path $portable | Out-Null
          Copy-Item -Path "build\bin\Release\*" -Destination $portable -Recurse -Force

          # Create ZIP
          $zip = Join-Path $PWD 'Musicefy-Portable.zip'
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory($portable, $zip)
          Write-Host "Created $zip"

      - name: Sign release binary
        if: env.SIGN_CERT_FILE != ''
        shell: cmd
        run: |
          call scripts\sign-release.bat "%SIGN_CERT_FILE%"
        env:
          SIGN_CERT_FILE: ${{ secrets.SIGN_CERT_FILE }}
          SIGN_CERT_PASS: ${{ secrets.SIGN_CERT_PASS }}

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Musicefy ${{ github.ref_name }} (Pre-release)
          body: |
            ⚠️ Pre-release build ⚠️
            Musicefy ${{ github.ref_name }} portable build generated by CI.
            This version is intended for testing and may not be stable.
          draft: false
          prerelease: true
          files: |
            Musicefy-Portable.zip
            build/bin/Release/musicefy.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
