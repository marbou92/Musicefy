name: Build Musicefy on Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.3.1

      - name: Install NuGet CLI
        uses: nuget/setup-nuget@v1

      - name: Clear NuGet cache
        run: nuget locals all -clear

      - name: NuGet restore into packages folder
        run: nuget restore Musicefy.sln -PackagesDirectory packages

      - name: Verify packages
        run: |
          dir packages\NAudio.2.2.1\lib /b
          dir packages\TagLibSharp.2.2.0\lib /b
          dir packages\System.Text.Json.6.0.0\lib /b

      - name: Build solution with MSBuild
        run: msbuild Musicefy.sln /t:Rebuild /p:Configuration=Release /p:Platform="AnyCPU" /p:RestorePackages=true /p:NuGetPackageRoot=packages
