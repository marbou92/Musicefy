name: Build Musicefy on Windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.3.1

      - name: Install NuGet CLI
        uses: nuget/setup-nuget@v1

      - name: Clear NuGet cache
        shell: pwsh
        run: nuget locals all -clear

      - name: NuGet restore into packages folder
        shell: pwsh
        run: nuget restore Musicefy.sln -PackagesDirectory packages

      - name: Verify packages (PowerShell)
        shell: pwsh
        run: |
          Write-Host "Checking NAudio package folder..."
          if (Test-Path 'packages\NAudio.2.2.1\lib') {
            Get-ChildItem 'packages\NAudio.2.2.1\lib' -Name
          } else {
            Write-Host "packages\NAudio.2.2.1\lib not found"
            exit 1
          }

          Write-Host "Checking TagLibSharp package folder..."
          if (Test-Path 'packages\TagLibSharp.2.2.0\lib') {
            Get-ChildItem 'packages\TagLibSharp.2.2.0\lib' -Name
          } else {
            Write-Host "packages\TagLibSharp.2.2.0\lib not found"
            exit 1
          }

          Write-Host "Checking System.Text.Json package folder..."
          if (Test-Path 'packages\System.Text.Json.6.0.0\lib') {
            Get-ChildItem 'packages\System.Text.Json.6.0.0\lib' -Name
          } else {
            Write-Host "packages\System.Text.Json.6.0.0\lib not found"
            exit 1
          }

      - name: Build solution with MSBuild
        shell: pwsh
        run: msbuild Musicefy.sln /t:Rebuild /p:Configuration=Release /p:Platform="AnyCPU" /p:RestorePackages=true /p:NuGetPackageRoot=packages
