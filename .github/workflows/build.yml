name: Build (Qt/CMake)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        id: install-qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_PREFIX_PATH="${{ steps.install-qt.outputs.qt-path }}" ^
            -S . -B build

      - name: Build Project
        shell: cmd
        run: |
          cmake --build build --config Release --parallel
