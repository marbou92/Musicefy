name: Build (Qt/CMake)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Configure CMake
        shell: cmd
        run: |
          call scripts\configure-msvc.bat Release "${{ env.QT_PATH }}"

      - name: Build Project
        shell: cmd
        run: |
          cmake --build build --config Release --parallel
