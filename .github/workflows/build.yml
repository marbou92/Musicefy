name: Build (Windows MSBuild)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download NuGet CLI
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile nuget.exe

      - name: Restore NuGet packages
        shell: pwsh
        run: .\nuget.exe restore Musicefy.sln -PackagesDirectory packages

      - name: Build solution
        shell: pwsh 
        run: & "${env:MSBUILD_PATH}" Musicefy.sln /t:Rebuild /p:Configuration=Release /v:m
        

      - name: Locate MSBuild
        id: msbuild
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe
          if (-not $msbuild) {
            Write-Error "MSBuild not found via vswhere"
            exit 1
          }
          Write-Host "MSBuild found: $msbuild"
          # set output for later step
          echo "MSBUILD_PATH=$msbuild" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build solution
        shell: pwsh
        run: |
          & "${env:MSBUILD_PATH}" Musicefy.sln /t:Rebuild /p:Configuration=Release /v:m
