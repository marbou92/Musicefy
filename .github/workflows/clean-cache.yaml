name: Clean and Build Musicefy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.3.1

      - name: Install NuGet CLI
        uses: nuget/setup-nuget@v1

      - name: Clear NuGet cache
        run: nuget locals all -clear

      - name: NuGet restore (packages folder)
        run: nuget restore Musicefy.sln -PackagesDirectory packages

      - name: Dotnet restore
        run: dotnet restore Musicefy.sln

      - name: Clean build artifacts
        shell: pwsh
        run: |
          git clean -xfd
          if (Test-Path "Musicefy/bin") { Remove-Item -Recurse -Force "Musicefy/bin" }
          if (Test-Path "Musicefy/obj") { Remove-Item -Recurse -Force "Musicefy/obj" }
          if (Test-Path "Musicefy.Core/bin") { Remove-Item -Recurse -Force "Musicefy.Core/bin" }
          if (Test-Path "Musicefy.Core/obj") { Remove-Item -Recurse -Force "Musicefy.Core/obj" }

      - name: Build solution
        run: msbuild Musicefy.sln /t:Rebuild /p:Configuration=Release /p:Platform="Any CPU" /p:RestorePackages=true /p:NuGetPackageRoot=packages
