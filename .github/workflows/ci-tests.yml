name: CI - Build & Test (Matrix)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-2022
    strategy:
      matrix:
        configuration: [ Debug, Release ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        id: install-qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_PREFIX_PATH="${{ steps.install-qt.outputs.qt-path }}" ^
            -S . -B build

      - name: Build Project
        shell: cmd
        run: |
          cmake --build build --config ${{ matrix.configuration }} --parallel

      - name: Run CTest unit tests
        shell: cmd
        run: |
          cd build
          ctest --output-on-failure -C ${{ matrix.configuration }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.configuration }}
          path: build/Testing/Temporary/
