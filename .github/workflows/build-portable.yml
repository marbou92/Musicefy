name: Build Portable EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      QT_PATH: ${{ steps.install-qt.outputs.qt-path }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        id: install-qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Verify Qt installation
        shell: cmd
        run: |
          echo Qt path: %QT_PATH%
          dir "%QT_PATH%\bin\windeployqt.exe"

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_PREFIX_PATH="%QT_PATH%" ^
            -S . -B build

      - name: Build Release
        shell: cmd
        run: |
          cmake --build build --config Release --parallel

      - name: Run windeployqt
        shell: cmd
        run: |
          "%QT_PATH%\bin\windeployqt.exe" ^
            --release ^
            --no-translations ^
            --no-system-d3d-compiler ^
            --no-opengl-sw ^
            --verbose 1 ^
            build\bin\Release\musicefy.exe

      - name: Copy SQL driver plugins
        shell: cmd
        run: |
          if not exist "build\bin\Release\sqldrivers" mkdir "build\bin\Release\sqldrivers"
          copy /Y "%QT_PATH%\plugins\sqldrivers\qsqlite.dll" "build\bin\Release\sqldrivers\" >nul 2>&1

      - name: Copy database migrations
        shell: cmd
        run: |
          if not exist "build\bin\Release\migrations" mkdir "build\bin\Release\migrations"
          copy /Y "src\core\database\migrations\*" "build\bin\Release\migrations\" >nul 2>&1

      - name: Create ZIP of portable folder
        shell: pwsh
        run: |
          $out = Join-Path $PWD 'build\bin\Release'
          $portable = Join-Path $PWD 'Musicefy-Portable'
          if (Test-Path $portable) { Remove-Item -Recurse -Force $portable }
          New-Item -ItemType Directory -Path $portable | Out-Null
          Copy-Item -Path (Join-Path $out '*') -Destination $portable -Recurse -Force
          
          $zip = Join-Path $PWD 'Musicefy-Portable.zip'
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory($portable, $zip)
          Write-Host "Created $zip"

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Musicefy-Portable
          path: |
            Musicefy-Portable
            Musicefy-Portable.zip
