name: Build Portable EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.3.1

      - name: Install NuGet CLI
        uses: nuget/setup-nuget@v1

      - name: Clear NuGet cache
        shell: pwsh
        run: nuget locals all -clear

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore Musicefy.sln -PackagesDirectory packages

      - name: Build solution (Release, Any CPU)
        shell: pwsh
        run: msbuild Musicefy.sln /t:Rebuild /p:Configuration=Release /p:Platform="Any CPU" /p:DebugType=none

      - name: Locate build output folder
        id: locate
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path . -Filter Musicefy.exe -Recurse -ErrorAction SilentlyContinue |
                 Where-Object { $_.FullName -match '\\bin\\Release' } | Select-Object -First 1
          if (-not $exe) { 
            Write-Host "Musicefy.exe not found in any bin\\Release folder. Listing candidates for debug:"
            Get-ChildItem -Path . -Directory -Recurse | Where-Object { $_.FullName -match '\\bin\\Release' } | ForEach-Object { Write-Host $_.FullName }
            throw "Musicefy.exe not found"
          }
          $outDir = $exe.Directory.FullName
          Write-Host "Found build output: $outDir"
          echo "output_dir=$outDir" >> $env:GITHUB_OUTPUT

      - name: Create Portable Directory and copy output
        shell: pwsh
        run: |
          $out = "${{ steps.locate.outputs.output_dir }}"
          $portable = Join-Path $PWD "Musicefy-Portable"
          if (Test-Path $portable) { Remove-Item -Recurse -Force $portable }
          New-Item -ItemType Directory -Path $portable | Out-Null
          Write-Host "Copying files from $out to $portable"
          Copy-Item -Path (Join-Path $out '*') -Destination $portable -Recurse -Force

          # Also copy common native/nuget DLLs if they live in packages and weren't copied
          Get-ChildItem -Path packages -Filter *.dll -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item -Path $_.FullName -Destination $portable -Force
          }

      - name: Create README for portable package
        shell: pwsh
        run: |
          $readme = Join-Path $PWD "Musicefy-Portable\README.txt"
          @(
            "Musicefy Portable",
            "=================",
            "",
            "This is a standalone version of Musicefy that requires no installation.",
            "",
            "To run:",
            "1. Extract all files to a folder",
            "2. Double-click Musicefy.exe",
            "3. Enjoy streaming music!",
            "",
            "Requirements:",
            "- Windows 7 SP1 or later",
            "- Internet connection for streaming",
            "- No additional software required",
            "",
            "Supported Streaming Services:",
            "- Squidify (Subsonic API)",
            "- Monochrome (Hi-Fi / TIDAL)",
            "- Local Music Files"
          ) | Out-File -FilePath $readme -Encoding UTF8

      - name: Create ZIP Archive
        shell: pwsh
        run: |
          $zipPath = Join-Path $PWD "Musicefy-Portable.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory((Join-Path $PWD "Musicefy-Portable"), $zipPath)
          Write-Host "Created $zipPath"

      - name: Get Tag (version)
        id: version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (-not $tag) { $tag = $env:GITHUB_REF -replace '^refs/tags/','' }
          if (-not $tag) { $tag = 'untagged' }
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          release_name: Musicefy ${{ steps.version.outputs.TAG }}
          body: |
            Musicefy ${{ steps.version.outputs.TAG }}

            ✅ Streaming Services
            - Squidify (Subsonic API)
            - Monochrome (Hi-Fi / TIDAL)
            - Local Music Files

            ✅ Features
            - Stream millions of songs
            - No installation required
            - Windows 7 compatible
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Portable ZIP
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Musicefy-Portable.zip
          asset_name: Musicefy-Portable.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Musicefy-Portable/Musicefy.exe
          asset_name: Musicefy.exe
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
