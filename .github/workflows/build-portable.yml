name: Build Portable EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.3.1

      - name: Install NuGet CLI
        uses: nuget/setup-nuget@v1

      - name: Clear NuGet cache
        shell: pwsh
        run: nuget locals all -clear

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore Musicefy.sln -PackagesDirectory packages

      - name: Build solution (diagnostic log)
        shell: pwsh
        run: |
          # Run MSBuild and capture stdout/stderr to msbuild.log
          msbuild Musicefy.sln /t:Rebuild /p:Configuration=Release /p:DebugType=none /v:diag > msbuild.log 2>&1
          $exit = $LASTEXITCODE
          Write-Host "MSBuild exit code: $exit"
          Write-Host '--- msbuild.log head ---'
          if (Test-Path msbuild.log) { Get-Content msbuild.log -TotalCount 200 | ForEach-Object { Write-Host $_ } } else { Write-Host 'msbuild.log not found' }
          # Save exit code so we can upload log and still fail later
          Set-Content -Path msbuild.exitcode -Value $exit

      - name: Upload msbuild.log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-log
          path: |
            msbuild.log
            msbuild.exitcode

      - name: Fail if MSBuild failed (preserve exit code)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path msbuild.exitcode) {
            $code = Get-Content msbuild.exitcode -ErrorAction Stop
            if ($code -ne '0') { Write-Error "MSBuild failed with exit code $code"; exit $code }
            else { Write-Host "MSBuild succeeded (exit code 0)." }
          } else {
            Write-Error "msbuild.exitcode not found; cannot determine MSBuild result"; exit 1
          }

      - name: Locate build output folder
        id: locate
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path . -Filter Musicefy.exe -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match '\\bin\\Release' } | Select-Object -First 1
          if ($null -eq $exe) {
            Write-Host 'Musicefy.exe not found in any bin\Release folder.'
            Get-ChildItem -Path . -Recurse -Directory -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match '\\bin\\Release' } | ForEach-Object { Write-Host "  $($_.FullName)" }
            echo "output_dir=" >> $env:GITHUB_OUTPUT
            exit 0
          }
          $outDir = $exe.Directory.FullName
          Write-Host "Found build output: $outDir"
          echo "output_dir=$outDir" >> $env:GITHUB_OUTPUT

      - name: Create portable folder and copy release output
        shell: pwsh
        run: |
          $out = '${{ steps.locate.outputs.output_dir }}'
          if (-not $out) { Write-Host "No output_dir provided; skipping portable packaging."; exit 0 }
          $portable = Join-Path -Path $PWD -ChildPath 'Musicefy-Portable'
          if (Test-Path $portable) { Remove-Item -Recurse -Force $portable }
          New-Item -ItemType Directory -Path $portable | Out-Null
          Write-Host "Copying files from $out to $portable"
          Copy-Item -Path (Join-Path $out '*') -Destination $portable -Recurse -Force
          if (Test-Path packages) {
            Write-Host "Copying DLLs from packages into portable folder (if any)"
            Get-ChildItem -Path packages -Filter *.dll -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Copy-Item -Path $_.FullName -Destination $portable -Force }
          }

      - name: List portable folder contents
        shell: pwsh
        run: |
          Write-Host 'Musicefy-Portable contents:'
          if (Test-Path 'Musicefy-Portable') {
            Get-ChildItem -Path 'Musicefy-Portable' -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.FullName)" }
          } else {
            Write-Host 'Musicefy-Portable folder not found.'
          }

      - name: Create ZIP of portable folder
        shell: pwsh
        run: |
          if (-not (Test-Path 'Musicefy-Portable')) { Write-Host 'No portable folder to zip; skipping.'; exit 0 }
          $zip = Join-Path $PWD 'Musicefy-Portable.zip'
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory((Join-Path $PWD 'Musicefy-Portable'), $zip)
          Write-Host "Created $zip"

      - name: Get tag name
        id: tag
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (-not $tag) { $tag = $env:GITHUB_REF -replace '^refs/tags/','' }
          if (-not $tag) { $tag = 'untagged' }
          echo "TAG=$tag" >> $env:GITHUB_OUTPUT

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          release_name: Musicefy ${{ steps.tag.outputs.TAG }}
          body: |
            Musicefy ${{ steps.tag.outputs.TAG }}

            Release built by CI.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable ZIP to release
        if: steps.create_release.outputs.upload_url != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Musicefy-Portable.zip
          asset_name: Musicefy-Portable.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE to release
        if: steps.create_release.outputs.upload_url != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Musicefy-Portable/Musicefy.exe
          asset_name: Musicefy.exe
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
