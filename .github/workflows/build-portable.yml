name: Build Portable EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.3.1

      - name: Install NuGet CLI
        uses: nuget/setup-nuget@v1

      - name: Clear NuGet cache
        shell: pwsh
        run: nuget locals all -clear

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore Musicefy.sln -PackagesDirectory packages

      - name: Build solution (diagnostic log)
        shell: pwsh
        run: |
          # create diagnostic msbuild log
          msbuild Musicefy.sln /t:Rebuild /p:Configuration=Release /p:DebugType=none /v:diag > msbuild.log 2>&1
          Write-Host '--- msbuild log head ---'
          Get-Content msbuild.log -TotalCount 200

      - name: Upload msbuild.log
        uses: actions/upload-artifact@v4
        with:
          name: msbuild-log
          path: msbuild.log

      - name: Find Musicefy.exe in Release outputs
        id: findexe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path . -Filter Musicefy.exe -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match '\\bin\\Release' } | Select-Object -First 1
          if ($null -eq $exe) {
            Write-Host 'Musicefy.exe not found in any bin\\Release folder.'
            # list candidate release folders for debugging
            Get-ChildItem -Path . -Recurse -Directory -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match '\\bin\\Release' } | ForEach-Object { Write-Host "  $($_.FullName)" }
            throw 'Musicefy.exe not found'
          }
          $outDir = $exe.Directory.FullName
          Write-Host "Found build output: $outDir"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "output_dir=$outDir"

      - name: Create portable folder and copy release output
        shell: pwsh
        run: |
          $out = '${{ steps.findexe.outputs.output_dir }}'
          $portable = Join-Path -Path $PWD -ChildPath 'Musicefy-Portable'
          if (Test-Path $portable) { Remove-Item -Recurse -Force $portable }
          New-Item -ItemType Directory -Path $portable | Out-Null
          Copy-Item -Path (Join-Path $out '*') -Destination $portable -Recurse -Force
          if (Test-Path packages) {
            Get-ChildItem -Path packages -Filter *.dll -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Copy-Item -Path $_.FullName -Destination $portable -Force }
          }

      - name: List portable folder contents
        shell: pwsh
        run: |
          Write-Host 'Musicefy-Portable contents:'
          if (Test-Path 'Musicefy-Portable') {
            Get-ChildItem -Path 'Musicefy-Portable' -Recurse -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.FullName)" }
          } else {
            Write-Host 'Musicefy-Portable folder not found.'
          }

      - name: Smoke test EXE (10s)
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path . -Filter Musicefy.exe -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match '\\Musicefy-Portable\\' } | Select-Object -First 1
          if ($null -eq $exe) { throw 'Musicefy.exe not found in Musicefy-Portable' }
          $proc = Start-Process -FilePath $exe.FullName -ArgumentList '/silent' -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 10
          if (-not $proc.HasExited) { $proc.Kill() }
          if ($proc.HasExited -and $proc.ExitCode -ne 0) { throw "Smoke test failed with exit code $($proc.ExitCode)" }

      - name: Create ZIP of portable folder
        shell: pwsh
        run: |
          $zip = Join-Path $PWD 'Musicefy-Portable.zip'
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory((Join-Path $PWD 'Musicefy-Portable'), $zip)
          Write-Host "Created $zip"

      - name: Get tag name
        id: tag
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (-not $tag) { $tag = $env:GITHUB_REF -replace '^refs/tags/','' }
          if (-not $tag) { $tag = 'untagged' }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "TAG=$tag"

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          release_name: Musicefy ${{ steps.tag.outputs.TAG }}
          body: |
            Musicefy ${{ steps.tag.outputs.TAG }}

            Release built by CI.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable ZIP to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Musicefy-Portable.zip
          asset_name: Musicefy-Portable.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./Musicefy-Portable/Musicefy.exe
          asset_name: Musicefy.exe
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
