name: Build Portable EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        id: install-qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Export Qt path
        id: qt
        shell: cmd
        run: |
          echo QT_ROOT=${{ steps.install-qt.outputs.qt-path }}>> "%GITHUB_OUTPUT%"
          echo Qt installed at: ${{ steps.install-qt.outputs.qt-path }}

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_PREFIX_PATH="${{ steps.install-qt.outputs.qt-path }}" ^
            -S . -B build

      - name: Build Release
        shell: cmd
        run: |
          cmake --build build --config Release --parallel

      - name: Package portable build
        shell: pwsh
        run: |
          $qtRoot = "${{ steps.qt.outputs.QT_ROOT }}"
          if (-not $qtRoot -or -not (Test-Path $qtRoot)) {
            # Fallback: find windeployqt from PATH
            $windeploy = (Get-Command windeployqt.exe -ErrorAction SilentlyContinue).Source
            if ($windeploy) {
              $qtRoot = Split-Path (Split-Path $windeploy)
              Write-Host "Found Qt from PATH: $qtRoot"
            } else {
              throw "Cannot find Qt installation"
            }
          }
          Write-Host "Qt root: $qtRoot"

          # Deploy Qt dependencies
          & "$qtRoot\bin\windeployqt.exe" --release --no-translations --no-system-d3d-compiler --no-opengl-sw --verbose 1 build\bin\Release\musicefy.exe

          # Copy SQL driver plugins
          $sqldrivers = "build\bin\Release\sqldrivers"
          New-Item -ItemType Directory -Path $sqldrivers -Force | Out-Null
          $qsqlite = Join-Path $qtRoot "plugins\sqldrivers\qsqlite.dll"
          if (Test-Path $qsqlite) {
            Copy-Item $qsqlite $sqldrivers -Force
            Write-Host "Copied qsqlite.dll"
          }

          # Copy database migrations
          $migrations = "build\bin\Release\migrations"
          New-Item -ItemType Directory -Path $migrations -Force | Out-Null
          Copy-Item "src\core\database\migrations\*" $migrations -Force

          # Create portable folder
          $portable = Join-Path $PWD 'Musicefy-Portable'
          if (Test-Path $portable) { Remove-Item -Recurse -Force $portable }
          New-Item -ItemType Directory -Path $portable | Out-Null
          Copy-Item -Path "build\bin\Release\*" -Destination $portable -Recurse -Force

          # Create ZIP
          $zip = Join-Path $PWD 'Musicefy-Portable.zip'
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::CreateFromDirectory($portable, $zip)
          Write-Host "Created portable ZIP: $zip"

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Musicefy-Portable
          path: |
            Musicefy-Portable
            Musicefy-Portable.zip
